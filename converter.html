<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLESS Converter — Koala Clash & Happ JSON</title>
    <meta name="description" content="Конвертер Koala Clash и Happ JSON конфигов в VLESS-ссылки.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header-placeholder"></div>

<div class="wrapper">
    <div class="page-breadcrumb">
        <a href="index.html">Главная</a> <span class="breadcrumb-sep">/</span> 
        <span>Инструменты</span> <span class="breadcrumb-sep">/</span> 
        <span class="breadcrumb-current">VLESS Converter</span>
    </div>

    <div class="logo">VLESS</div>
    <p class="subtitle">root@converter:~/tools$ ./vless-converter</p>

    <div class="terminal-card">
        <div class="terminal-topbar">
            <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
            <span class="terminal-title">Koala Clash / Happ JSON → VLESS</span>
        </div>
        <div class="card-body">
            <p class="section-label"># Выбор формата</p>
            <div class="tabs">
                <button class="tab-btn active" data-tab="koala">Koala Clash</button>
                <button class="tab-btn" data-tab="happ">Happ JSON</button>
            </div>

            <div id="koala" class="tab-content active">
                <label>YAML конфиг Koala Clash</label>
                <textarea id="koala-input" placeholder="proxies:&#10;  - name: 'Server 1'&#10;    type: vless&#10;    server: example.com&#10;    port: 443&#10;    uuid: xxx-xxx-xxx&#10;    tls: true"></textarea>
            </div>

            <div id="happ" class="tab-content">
                <label>JSON конфиг Happ</label>
                <textarea id="happ-input" placeholder='{"outbounds": [{"protocol": "vless", ...}]}'></textarea>
            </div>

            <div class="convert-row">
                <button class="btn btn-blue" onclick="convert()">[ ⚡ Конвертировать ]</button>
            </div>
            <div class="status-bar" id="statusBar">
                <div class="dot-status"></div>
                <span id="statusText">ожидание ввода...</span>
            </div>
        </div>
    </div>

    <div class="terminal-card result-section" id="result-section" style="display:none;">
        <div class="terminal-topbar">
            <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
            <span class="terminal-title">// output</span>
        </div>
        <div class="card-body">
            <div class="result-header">
                <div class="result-count" id="result-count">Найдено: 0 ссылок</div>
                <div class="btn-row result-actions">
                    <button class="btn btn-ghost" onclick="copyAll()">[ 📋 Копировать все ]</button>
                    <button class="btn btn-ghost" onclick="downloadAll()">[ 💾 Скачать ]</button>
                </div>
            </div>
            <div id="results-list" class="results-list"></div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="clearAll()">[ 🗑️ Очистить ]</button>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
</div>

<script src="common.js"></script>
<script src="converter.js"></script>
</body>
</html>
