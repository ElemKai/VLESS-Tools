<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLESS Checker — Проверка доступности серверов</title>
    <meta name="description" content="Проверка доступности и времени отклика VLESS серверов.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header-placeholder"></div>

<div class="wrapper">
    <div class="page-breadcrumb">
        <a href="index.html">Главная</a> <span class="breadcrumb-sep">/</span> 
        <span>Инструменты</span> <span class="breadcrumb-sep">/</span> 
        <span class="breadcrumb-current">VLESS Checker</span>
    </div>

    <div class="logo">VLESS</div>
    <p class="subtitle">root@checker:~/tools$ ./vless-checker</p>

    <div class="terminal-card">
        <div class="terminal-topbar">
            <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
            <span class="terminal-title">VLESS Server Availability Checker</span>
        </div>
        <div class="card-body">
            <p class="section-label"># Входные данные</p>
            <label>VLESS ссылки (каждая с новой строки)</label>
            <textarea id="vless-input" placeholder="vless://uuid@server:port?security=tls&type=tcp#Server1&#10;vless://uuid@server2:port?security=reality#Server2"></textarea>
            
            <div class="checker-options">
                <div class="option-group">
                    <label>Таймаут (мс)</label>
                    <input type="number" id="timeout-input" value="5000" min="1000" max="30000" step="500">
                </div>
                <div class="option-group">
                    <label>Параллельные проверки</label>
                    <input type="number" id="parallel-input" value="5" min="1" max="20">
                </div>
            </div>

            <div class="convert-row">
                <button class="btn btn-blue" onclick="checkServers()">[ 🔍 Проверить серверы ]</button>
                <button class="btn btn-ghost" onclick="clearChecker()">[ 🗑️ Очистить ]</button>
            </div>
            <div class="status-bar" id="statusBar">
                <div class="dot-status"></div>
                <span id="statusText">ожидание ввода...</span>
            </div>
        </div>
    </div>

    <div class="terminal-card result-section" id="result-section" style="display:none;">
        <div class="terminal-topbar">
            <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
            <span class="terminal-title">// результаты проверки</span>
        </div>
        <div class="card-body">
            <div class="result-header">
                <div class="result-count" id="result-count">Проверено: 0 серверов</div>
                <div class="btn-row result-actions">
                    <button class="btn btn-ghost" onclick="copyResults()">[ 📋 Копировать ]</button>
                    <button class="btn btn-ghost" onclick="exportResults()">[ 💾 Экспорт ]</button>
                </div>
            </div>
            <div class="checker-stats">
                <div class="stat-box online">
                    <div class="stat-value" id="online-count">0</div>
                    <div class="stat-label">Онлайн</div>
                </div>
                <div class="stat-box offline">
                    <div class="stat-value" id="offline-count">0</div>
                    <div class="stat-label">Офлайн</div>
                </div>
                <div class="stat-box avg-ping">
                    <div class="stat-value" id="avg-ping">-</div>
                    <div class="stat-label">Средний пинг</div>
                </div>
            </div>
            <div id="results-table" class="results-table"></div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
</div>

<script src="common.js"></script>
<script src="checker.js"></script>
</body>
</html>
